name: Parity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  parity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # PINNED DELIBERATELY — do not change back to `latest`, and do not
          # "relax" this to a range like 1.3.x (a range is NOT equivalent; see
          # below). Bump it on purpose, in its own commit, when we want a new Bun.
          #
          # Why: `latest` is not a version, it's a QUESTION the runner has to ask
          # at run time. setup-bun answers it by listing EVERY tag in the Bun repo
          # via api.github.com. On 2026-07-16 that endpoint returned 503 during a
          # GitHub API degradation and the whole run died before a single step of
          # ours executed -- reporting "failure" for code that was never run.
          # An exact version removes that call entirely: setup-bun's
          # download-url.ts does `if (validateStrict(version)) tag = bun-v${version}`
          # and only falls through to the tag-listing request when that fails. So
          # `latest` AND any semver range both hit the API; only a strict exact
          # version short-circuits it. The download itself goes to
          # github.com/oven-sh/bun/releases/download/ (releases/CDN), which stayed
          # operational through that same outage.
          #
          # It also buys reproducibility: with `latest`, a Bun release silently
          # changes what CI runs on a day we changed nothing, so a real failure can
          # appear in a run with no commit behind it.
          #
          # The cost is real: pinned versions rot. This is now a thing a human must
          # move forward deliberately -- which is the point. 1.3.14 is what the
          # 2026-07-16 green run resolved `latest` to, so pinning it was a no-op on
          # behavior.
          bun-version: 1.3.14

      - name: Set up Node (for NuGet/npm tooling)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enforce core platform-agnosticism (AGNOSTIC-03)
        run: |
          cd viewmodel-shell
          npm install
          npm run build
          npm run check:core-globals

      - name: Enforce WCAG-AA on shipped default (D-07)
        run: |
          cd viewmodel-shell
          npm run check:aa-contrast

      - name: Enforce zero per-demo <style> (D-12/D-15)
        run: |
          cd viewmodel-shell
          npm run check:no-demo-style

      - name: Enforce theme byte-identity (D-03/D-26)
        run: |
          cd viewmodel-shell
          npm run check:theme-byte-identity

      - name: Enforce theme function — each theme renders its named scheme (D-26)
        run: |
          cd viewmodel-shell
          npm run check:theme-function

      - name: Type-check the test sources (nothing else does)
        # tsconfig.json includes src/**/*.ts and EXPLICITLY excludes
        # src/**/*.test.ts; the test/ tree is outside include entirely; and
        # vitest transpiles per-file without type-checking. So every test file
        # was gated by NEITHER -- a suite could pass green while the type it
        # asserted did not exist. Proven at RED: a ButtonNode.variant (removed
        # in 3.0.0) type-errors here while vitest reports 54/54 passing.
        # Must run BEFORE the suite: a type error is a cheaper, clearer failure
        # than whatever the untyped code does at runtime.
        run: cd viewmodel-shell && npm run check:test-types

      - name: Framework adapter-seam tests (D-12.2 relocation proof)
        run: cd viewmodel-shell && npx vitest run

      - name: Build .NET demos
        run: |
          dotnet build demo/Tasks/AspNetCore/ViewModelShell.csproj
          dotnet build demo/ContactManager/AspNetCore/ContactManager.csproj
          dotnet build demo/ExpenseTracker/AspNetCore/ExpenseTracker.csproj
          dotnet build demo/RetroBoard/AspNetCore/RetroBoard.csproj
          dotnet build demo/HelpDesk/AspNetCore/HelpDesk.csproj

      - name: Run .NET tests
        run: |
          # Framework's OWN test project FIRST (ViewTreeValidation, envelope,
          # exception-filter) — builds itself via its ProjectReference to the
          # NuGet source project. Omitting it here is how it silently rotted
          # (uncompilable from 3.0.0's ButtonNode.Variant removal until 3.3.0).
          dotnet test viewmodel-shell-dotnet/Tests
          dotnet test demo/Tasks/AspNetCore.Tests --no-build
          dotnet test demo/ContactManager/AspNetCore.Tests --no-build
          dotnet test demo/ExpenseTracker/AspNetCore.Tests --no-build
          dotnet test demo/RetroBoard/AspNetCore.Tests --no-build
          dotnet test demo/HelpDesk/AspNetCore.Tests --no-build

      - name: Install Bun deps
        run: |
          # The *-bun demos consume the framework from local source (live symlink),
          # the bun analog of the .NET ProjectReference / frontend Vite alias — not
          # the npm registry. Their lockfiles pin "link:@ashley-shrok/viewmodel-shell",
          # so the package must be bun-link-registered before the frozen installs can
          # resolve it. dist/ already exists (built in the AGNOSTIC-03 step above).
          (cd viewmodel-shell && bun link)
          for dir in demo/*-bun; do
            (cd "$dir" && bun install --frozen-lockfile)
          done
          cd parity && bun install --frozen-lockfile

      - name: Run cross-backend parity tests
        run: cd parity && bun run run.ts
