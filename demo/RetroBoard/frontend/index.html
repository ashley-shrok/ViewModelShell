<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Board</title>
  <style>
    :root {
      --bg:          #0f0f11;
      --surface:     #18181c;
      --surface-2:   #222228;
      --border:      #2e2e38;
      --accent:      #7c6af7;
      --accent-glow: rgba(124,106,247,0.18);
      --accent-dim:  rgba(124,106,247,0.35);
      --text:        #e8e8f0;
      --text-muted:  #6b6b80;
      --done-bg:     #3a3a48;
      --done-text:   #5a5a6e;
      --error:       #e05a5a;
      --green:       #4ade80;
      --red:         #f87171;
      --yellow:      #fbbf24;
      --radius:      10px;
      --radius-sm:   6px;
      --font-head:   'DM Serif Display', Georgia, serif;
      --font-body:   'DM Mono', 'Fira Mono', monospace;
      --t:           0.15s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      min-height: 100dvh;
      padding: 2.5rem 1.5rem 4rem;
    }

    body.is-loading #app { opacity: 0.6; pointer-events: none; transition: opacity 0.1s; }
    #app { width: 100%; max-width: 1280px; margin: 0 auto; }

    /* ── Page: title takes full row, stat bar full row, then columns ── */
    .vms-page {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
    }
    .vms-page__title {
      width: 100%;
      font-family: var(--font-head);
      font-size: 2.25rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── Stat bar ── */
    .vms-stat-bar { width: 100%; display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .vms-stat-bar__item { display: flex; align-items: baseline; gap: 0.4rem; }
    .vms-stat-bar__value { color: var(--accent); font-weight: 600; font-size: 1.1rem; }
    .vms-stat-bar__label { color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* ── Sections as columns ── */
    .vms-section {
      flex: 1;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .vms-section__heading {
      font-family: var(--font-head);
      font-size: 1.15rem;
      font-weight: 400;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    /* ── Form ── */
    .vms-form { display: flex; gap: 0.5rem; }
    .vms-field { flex: 1; }
    .vms-field__label { display: block; margin-bottom: 0.3rem; font-size: 12px; color: var(--text-muted); }
    .vms-field__input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      padding: 0.55rem 0.8rem;
      outline: none;
      transition: border-color var(--t), box-shadow var(--t);
    }
    .vms-field__input::placeholder { color: var(--text-muted); }
    .vms-field__input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* ── Buttons ── */
    .vms-button {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 13px;
      padding: 0.5rem 0.75rem;
      transition: background var(--t), border-color var(--t), transform var(--t);
      white-space: nowrap;
    }
    .vms-button:hover { border-color: var(--accent-dim); }
    .vms-button:active { transform: scale(0.96); }
    .vms-button--primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .vms-button--primary:hover { background: #9585f9; border-color: #9585f9; }
    .vms-button--danger {
      background: transparent;
      border: none;
      color: var(--text-muted);
      opacity: 0;
      padding: 0.2rem 0.35rem;
      border-radius: var(--radius-sm);
    }
    .vms-button--danger:hover { color: var(--error); background: rgba(224,90,90,0.1); opacity: 1 !important; }
    .vms-list-item:hover .vms-button--danger { opacity: 1; }

    /* ── List ── */
    .vms-list { list-style: none; display: flex; flex-direction: column; gap: 0.375rem; }
    .vms-list-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.55rem 0.65rem;
      transition: border-color var(--t), background var(--t);
      animation: vms-in 0.15s ease;
    }
    .vms-list-item:hover { border-color: var(--accent-dim); }
    .vms-list-item--done { background: var(--done-bg); border-color: transparent; }

    @keyframes vms-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Text ── */
    .vms-text { flex: 1; line-height: 1.4; word-break: break-word; }
    .vms-text--strikethrough { color: var(--done-text); text-decoration: line-through; }
    .vms-text--muted { color: var(--text-muted); }

    /* ── Checkbox ── */
    .vms-checkbox { position: relative; flex-shrink: 0; cursor: pointer; }
    .vms-checkbox__input { opacity: 0; position: absolute; width: 18px; height: 18px; cursor: pointer; margin: 0; }
    .vms-checkbox__mark {
      display: block;
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--border);
      border-radius: 5px;
      background: var(--surface);
      transition: background var(--t), border-color var(--t);
      position: relative;
    }
    .vms-checkbox__input:checked + .vms-checkbox__mark { background: var(--accent); border-color: var(--accent); }
    .vms-checkbox__input:checked + .vms-checkbox__mark::after {
      content: '';
      position: absolute;
      left: 4px; top: 1px;
      width: 5px; height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(40deg);
    }

    /* ── Error banner ── */
    .vms-error {
      background: rgba(224,90,90,0.12);
      border: 1px solid var(--error);
      border-radius: var(--radius);
      color: var(--error);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 1rem;
      padding: 0.65rem 1rem;
      width: 100%;
    }
    .vms-error button { background: none; border: none; color: inherit; cursor: pointer; font-size: 16px; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Serif+Display&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
