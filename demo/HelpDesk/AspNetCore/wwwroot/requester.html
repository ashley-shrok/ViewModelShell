<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help Desk — Requester</title>
  <style>
    :root {
      --bg:          #0f0f11;
      --surface:     #18181c;
      --surface-2:   #222228;
      --border:      #2e2e38;
      --accent:      #7c6af7;
      --accent-glow: rgba(124,106,247,0.18);
      --accent-dim:  rgba(124,106,247,0.35);
      --text:        #e8e8f0;
      --text-muted:  #6b6b80;
      --done-bg:     #3a3a48;
      --done-text:   #5a5a6e;
      --error:       #e05a5a;
      --warning:     #d4821a;
      --radius:      10px;
      --radius-sm:   6px;
      --font-head:   'DM Serif Display', Georgia, serif;
      --font-body:   'DM Mono', 'Fira Mono', monospace;
      --t:           0.15s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem 4rem;
    }

    body.is-loading #app { opacity: 0.6; pointer-events: none; transition: opacity 0.1s; }
    #app { width: 100%; max-width: 600px; }

    /* ── Page ── */
    .vms-page { display: flex; flex-direction: column; gap: 1.5rem; }
    .vms-page__title {
      font-family: var(--font-head);
      font-size: 2.25rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── Section ── */
    .vms-section { display: flex; flex-direction: column; gap: 0.75rem; }
    .vms-section__heading { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }

    /* ── Stat bar ── */
    .vms-stat-bar { display: flex; gap: 1.25rem; }
    .vms-stat-bar__item { display: flex; align-items: baseline; gap: 0.4rem; }
    .vms-stat-bar__value { color: var(--accent); font-weight: 600; }
    .vms-stat-bar__label { color: var(--text-muted); font-size: 12px; }

    /* ── Form ── */
    .vms-form { display: flex; flex-direction: column; gap: 0.75rem; }
    .vms-field { display: flex; flex-direction: column; gap: 0.3rem; }
    .vms-field__label { font-size: 12px; color: var(--text-muted); }
    .vms-field__input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 0.65rem 1rem;
      outline: none;
      transition: border-color var(--t), box-shadow var(--t);
      resize: vertical;
    }
    .vms-field__input::placeholder { color: var(--text-muted); }
    .vms-field__input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    textarea.vms-field__input { min-height: 80px; }

    /* ── Buttons ── */
    .vms-button {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 13px;
      padding: 0.55rem 0.9rem;
      transition: background var(--t), border-color var(--t);
    }
    .vms-button:hover { border-color: var(--accent-dim); }
    .vms-button--primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      padding: 0.65rem 1.25rem;
      align-self: flex-start;
    }
    .vms-button--primary:hover { background: #9585f9; border-color: #9585f9; }
    .vms-button--secondary {
      background: transparent;
      border-color: var(--accent-dim);
      color: var(--accent);
      font-size: 12px;
      padding: 0.35rem 0.7rem;
    }
    .vms-button--secondary:hover { border-color: var(--accent); background: var(--accent-glow); }
    .vms-button--danger {
      background: transparent;
      border: none;
      color: var(--text-muted);
      opacity: 0;
      padding: 0.25rem 0.4rem;
    }
    .vms-button--danger:hover { color: var(--error); opacity: 1 !important; }
    .vms-list-item:hover .vms-button--danger { opacity: 1; }

    /* ── Tabs ── */
    .vms-tabs {
      display: flex;
      gap: 0.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.25rem;
    }
    .vms-tabs__tab {
      flex: 1;
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 12px;
      letter-spacing: 0.05em;
      padding: 0.4rem 0;
      text-transform: uppercase;
      transition: background var(--t), color var(--t);
    }
    .vms-tabs__tab:hover { color: var(--text); }
    .vms-tabs__tab--active { background: var(--surface-2); color: var(--accent); }

    /* ── List ── */
    .vms-list { list-style: none; display: flex; flex-direction: column; gap: 0.375rem; }
    .vms-list-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      transition: border-color var(--t);
      animation: vms-in 0.15s ease;
    }
    .vms-list-item:hover { border-color: var(--accent-dim); }
    .vms-list-item--done     { background: var(--done-bg); border-color: transparent; }
    .vms-list-item--high     { border-color: rgba(212,130,26,0.45); }
    .vms-list-item--critical { border-color: rgba(224,90,90,0.55); background: rgba(224,90,90,0.04); }

    @keyframes vms-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Text ── */
    .vms-text { flex: 1; line-height: 1.4; word-break: break-word; }
    .vms-text--subheading   { font-weight: 600; }
    .vms-text--muted        { color: var(--text-muted); font-size: 12px; }
    .vms-text--body         { line-height: 1.6; }
    .vms-text--strikethrough { color: var(--done-text); text-decoration: line-through; }
    .vms-text--error        { color: var(--error); font-size: 13px; }
    .vms-text--heading      { font-family: var(--font-head); font-size: 1.5rem; }

    /* ── Error banner ── */
    .vms-error {
      background: rgba(224,90,90,0.12);
      border: 1px solid var(--error);
      border-radius: var(--radius);
      color: var(--error);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 1rem;
      padding: 0.65rem 1rem;
    }
    .vms-error button { background: none; border: none; color: inherit; cursor: pointer; }
  </style>
