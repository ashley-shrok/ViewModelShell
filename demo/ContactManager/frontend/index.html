<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Manager</title>
  <style>
    :root {
      --bg:          #0f0f11;
      --surface:     #18181c;
      --surface-2:   #222228;
      --border:      #2e2e38;
      --accent:      #7c6af7;
      --accent-glow: rgba(124,106,247,0.18);
      --accent-dim:  rgba(124,106,247,0.35);
      --text:        #e8e8f0;
      --text-muted:  #6b6b80;
      --error:       #e05a5a;
      --radius:      10px;
      --radius-sm:   6px;
      --font-head:   'DM Serif Display', Georgia, serif;
      --font-body:   'DM Mono', 'Fira Mono', monospace;
      --t:           0.15s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem 4rem;
    }

    body.is-loading #app { opacity: 0.6; pointer-events: none; transition: opacity 0.1s; }
    #app { width: 100%; max-width: 560px; }

    /* ── Page ── */
    .vms-page { display: flex; flex-direction: column; gap: 1.25rem; }
    .vms-page__title {
      font-family: var(--font-head);
      font-size: 2.25rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── Stat bar ── */
    .vms-stat-bar { display: flex; gap: 1.25rem; }
    .vms-stat-bar__item { display: flex; align-items: baseline; gap: 0.4rem; }
    .vms-stat-bar__value { color: var(--accent); font-weight: 600; }
    .vms-stat-bar__label { color: var(--text-muted); font-size: 12px; }

    /* ── Form ── */
    .vms-form { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .vms-field { flex: 1; min-width: 180px; }
    .vms-field__label { display: block; margin-bottom: 0.3rem; font-size: 12px; color: var(--text-muted); }
    .vms-field__input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 0.65rem 1rem;
      outline: none;
      transition: border-color var(--t), box-shadow var(--t);
      resize: vertical;
    }
    .vms-field__input::placeholder { color: var(--text-muted); }
    .vms-field__input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* Detail/add form: stack fields vertically */
    .vms-form:has(textarea) { flex-direction: column; }
    .vms-form:has(textarea) .vms-field { min-width: 0; }
    textarea.vms-field__input { min-height: 80px; }

    /* ── Buttons ── */
    .vms-button {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 13px;
      padding: 0.55rem 0.9rem;
      transition: background var(--t), border-color var(--t), transform var(--t);
    }
    .vms-button:hover { border-color: var(--accent-dim); }
    .vms-button:active { transform: scale(0.96); }
    .vms-button--primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      padding: 0.65rem 1.1rem;
    }
    .vms-button--primary:hover { background: #9585f9; border-color: #9585f9; }
    .vms-button--danger {
      background: transparent;
      border-color: transparent;
      color: var(--error);
      opacity: 0.7;
    }
    .vms-button--danger:hover { opacity: 1; background: rgba(224,90,90,0.1); }

    /* ── List ── */
    .vms-list { list-style: none; display: flex; flex-direction: column; gap: 0.375rem; }
    #contact-list { max-height: 420px; overflow-y: auto; padding-right: 4px; }
    #contact-list::-webkit-scrollbar { width: 4px; }
    #contact-list::-webkit-scrollbar-track { background: transparent; }
    #contact-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .vms-list-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      transition: border-color var(--t);
      animation: vms-in 0.15s ease;
    }
    .vms-list-item:hover { border-color: var(--accent-dim); }

    @keyframes vms-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Text ── */
    .vms-text { line-height: 1.4; word-break: break-word; }
    .vms-text:first-child { flex: 1; font-weight: 500; }
    .vms-text--muted { color: var(--text-muted); font-size: 12px; min-width: 130px; }
    .vms-text--heading { font-family: var(--font-head); font-size: 1.5rem; }
    .vms-text--subheading { font-size: 1.1rem; font-weight: 600; }
    .vms-text--strikethrough { text-decoration: line-through; color: var(--text-muted); }

    /* ── Error banner ── */
    .vms-error {
      background: rgba(224,90,90,0.12);
      border: 1px solid var(--error);
      border-radius: var(--radius);
      color: var(--error);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 1rem;
      padding: 0.65rem 1rem;
    }
    .vms-error button { background: none; border: none; color: inherit; cursor: pointer; font-size: 16px; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Serif+Display&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
