<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--vms-bg);
      color: var(--vms-text);
      font-family: var(--vms-font-body);
      font-size: 14px;
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem 4rem;
    }
    body.is-loading #app { opacity: 0.6; pointer-events: none; transition: opacity 0.1s; }
    #app { width: 100%; max-width: 560px; }

    /* Inline "Add Transaction" form */
    .vms-form { flex-direction: row; gap: 0.5rem; align-items: flex-end; }
    .vms-form .vms-field { flex: 1; }
    .vms-form .vms-button--primary { align-self: stretch; white-space: nowrap; }

    /* Section heading: serif look, not the framework's small-caps */
    .vms-section__heading {
      font-family: var(--vms-font-head);
      font-size: 1.15rem;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0.01em;
      color: var(--vms-text-muted);
    }

    /* Strip spinners on number inputs */
    .vms-field__input[type=number]::-webkit-inner-spin-button,
    .vms-field__input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .vms-field__input[type=number] { -moz-appearance: textfield; }

    /* Tint over-budget category progress bar */
    .vms-list-item--warning .vms-progress__bar { background: var(--vms-warning); }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Serif+Display&display=swap"
    rel="stylesheet"
  />
  <script type="module" crossorigin src="/assets/index-Co6keU6x.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DelbYq1W.css">
</head>
<body>
  <div id="app"></div>
</body>
</html>
